version: '3.4'
services:
  ejercicio-share:
    image: alfresco-share-ejercicio:development
    build:
      dockerfile: ./Dockerfile
      context: ../ejercicio-share-docker/target
    environment:
      CATALINA_OPTS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=0.0.0.0:8888"
      REPO_HOST: ejercicio-acs
      REPO_PORT: 8080
    ports:
      - "8081:8080"
      - "8888:8888"
  ejercicio-acs:
    image: alfresco-content-services-ejercicio:development
    build:
      dockerfile: ./Dockerfile
      context: ../ejercicio-platform-docker/target
    environment:
      JAVA_TOOL_OPTIONS: "-Dencryption.keystore.type=JCEKS
            -Dencryption.cipherAlgorithm=AES/CBC/PKCS5Padding
            -Dencryption.keyAlgorithm=AES
            -Dencryption.keystore.location=/usr/local/tomcat/shared/classes/alfresco/extension/keystore/keystore
            -Dmetadata-keystore.password=mp6yc0UD9e
            -Dmetadata-keystore.aliases=metadata
            -Dmetadata-keystore.metadata.password=oKIWzVdEdA
            -Dmetadata-keystore.metadata.algorithm=AES"
      CATALINA_OPTS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=0.0.0.0:8888"
    ports:
      - "8080:8080"
      - "8889:8888"
    volumes:
      - ejercicio-acs-volume:/usr/local/tomcat/alf_data
    depends_on:
      - ejercicio-postgres
  ejercicio-postgres:
    image: postgres:9.6
    environment:
      POSTGRES_DB: alfresco
      POSTGRES_USER: alfresco
      POSTGRES_PASSWORD: alfresco
    command: postgres -c max_connections=300 -c log_min_messages=LOG
    ports:
      - "5432:5432"
    volumes:
      - ejercicio-db-volume:/var/lib/postgresql/data
  ejercicio-ass:
    image: alfresco/alfresco-search-services:1.2.0
    environment:
      SOLR_ALFRESCO_HOST: ejercicio-acs
      SOLR_ALFRESCO_PORT: 8080
      SOLR_SOLR_HOST: ejercicio-ass
      SOLR_SOLR_PORT: 8983
      SOLR_CREATE_ALFRESCO_DEFAULTS: alfresco,archive
    ports:
      - "8983:8983"
    volumes:
      - ejercicio-ass-volume:/opt/alfresco-search-services/contentstore
      - ejercicio-ass-volume:/opt/alfresco-search-services/data
volumes:
  ejercicio-acs-volume:
    external: true
  ejercicio-db-volume:
    external: true
  ejercicio-ass-volume:
    external: true